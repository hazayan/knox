# Generic Knox D-Bus bridge user-service template.
# Adapt keys and command syntax to the target user service manager.

name = knox-dbus
type = process
command = /usr/local/bin/knox-dbus --config ${XDG_CONFIG_HOME}/knox/dbus.yaml
restart = on-failure
working_directory = ${HOME}
stdout_log = ${XDG_STATE_HOME}/knox/knox-dbus.log
stderr_log = ${XDG_STATE_HOME}/knox/knox-dbus.err
