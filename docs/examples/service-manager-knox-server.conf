# Generic Knox server service template.
# Adapt keys and command syntax to the target host service manager.

name = knox-server
type = process
command = /usr/local/bin/knox-server --config /usr/local/etc/knox/server.yaml
restart = on-failure
user = knox
working_directory = /var/db/knox
stdout_log = /var/log/knox/knox-server.log
stderr_log = /var/log/knox/knox-server.err
environment = KNOX_MASTER_KEY_FILE=/usr/local/etc/knox/master.key
